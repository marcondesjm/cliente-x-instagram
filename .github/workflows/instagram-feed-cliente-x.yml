name: Instagram Feed Cliente X

on:
  schedule:
    - cron: "10 16 * * *"
    - cron: "50 14 * * *"
    - cron: "0 16 * * *"
    - cron: "0 19 * * *"
    - cron: "0 22 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      account:
        description: "Account key from accounts config"
        required: true
        default: "cliente-x"
      dry_run:
        description: "Run without publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  instagram-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ACCOUNT: ${{ github.event.inputs.account || 'cliente-x' }}
      DRY_RUN: ${{ github.event_name == 'schedule' && github.event.schedule == '10 16 * * *' && 'true' || (github.event_name == 'schedule' && 'false' || (github.event.inputs.dry_run || 'true')) }}
      CLIENTE_X_INSTAGRAM_ACCESS_TOKEN: ${{ secrets.CLIENTE_X_INSTAGRAM_ACCESS_TOKEN }}
      CLIENTE_X_INSTAGRAM_USER_ID: ${{ secrets.CLIENTE_X_INSTAGRAM_USER_ID }}
      IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate copy
        run: node automation/instagram-template/scripts/publish-carousel.mjs --account "$ACCOUNT" --validate-copy

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Select scheduled content slot
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          case "${{ github.event.schedule }}" in
            "10 16 * * *") SLOT_INDEX=1 ;;
            "50 14 * * *") SLOT_INDEX=0 ;;
            "0 16 * * *") SLOT_INDEX=1 ;;
            "0 19 * * *") SLOT_INDEX=2 ;;
            "0 22 * * *") SLOT_INDEX=3 ;;
            "0 1 * * *") SLOT_INDEX=4 ;;
            *) SLOT_INDEX=0 ;;
          esac
          echo "INSTAGRAM_TEMPLATE_SLOT_INDEX=$SLOT_INDEX" >> "$GITHUB_ENV"

      - name: Publish carousel
        shell: bash
        run: |
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node automation/instagram-template/scripts/publish-carousel.mjs --account "$ACCOUNT" $ARGS

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-template-runs
          path: automation/instagram-template/runs/
          if-no-files-found: ignore
