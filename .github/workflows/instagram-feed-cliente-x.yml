name: Instagram Feed Cliente X

on:
  schedule:
    - cron: "30 9 * * *"
    - cron: "10 11 * * *"
    - cron: "0 12 * * *"
    - cron: "30 15 * * *"
    - cron: "30 16 * * *"
    - cron: "10 18 * * *"
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      account:
        description: "Account key from accounts config"
        required: true
        default: "cliente-x"
      dry_run:
        description: "Run without publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      slot_index:
        description: "Content slot to publish"
        required: true
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
          - "6"

jobs:
  instagram-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ACCOUNT: ${{ github.event.inputs.account || 'cliente-x' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
      CLIENTE_X_INSTAGRAM_ACCESS_TOKEN: ${{ secrets.CLIENTE_X_INSTAGRAM_ACCESS_TOKEN }}
      CLIENTE_X_INSTAGRAM_USER_ID: ${{ secrets.CLIENTE_X_INSTAGRAM_USER_ID }}
      IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate copy
        run: npm run instagram -- --account "$ACCOUNT" --validate-copy

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Select content slot
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT_INDEX="${{ github.event.inputs.slot_index || '0' }}"
          else
            case "${{ github.event.schedule }}" in
              "30 9 * * *") SLOT_INDEX="0" ;;
              "10 11 * * *") SLOT_INDEX="1" ;;
              "0 12 * * *") SLOT_INDEX="2" ;;
              "30 15 * * *") SLOT_INDEX="3" ;;
              "30 16 * * *") SLOT_INDEX="4" ;;
              "10 18 * * *") SLOT_INDEX="5" ;;
              "30 20 * * *") SLOT_INDEX="6" ;;
              *) SLOT_INDEX="0" ;;
            esac
          fi
          echo "INSTAGRAM_TEMPLATE_SLOT_INDEX=$SLOT_INDEX" >> "$GITHUB_ENV"

      - name: Publish feed and story
        shell: bash
        run: |
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          npm run instagram -- --account "$ACCOUNT" $ARGS

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-template-runs
          path: automation/instagram-template/runs/
          if-no-files-found: ignore
