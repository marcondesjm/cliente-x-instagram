name: Instagram Feed Cliente X

on:
  workflow_dispatch:
    inputs:
      account:
        description: "Account key from accounts config"
        required: true
        default: "cliente-x"
      dry_run:
        description: "Run without publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      slot_index:
        description: "Content slot to publish"
        required: true
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"
          - "4"

jobs:
  instagram-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ACCOUNT: ${{ github.event.inputs.account || 'cliente-x' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
      CLIENTE_X_INSTAGRAM_ACCESS_TOKEN: ${{ secrets.CLIENTE_X_INSTAGRAM_ACCESS_TOKEN }}
      CLIENTE_X_INSTAGRAM_USER_ID: ${{ secrets.CLIENTE_X_INSTAGRAM_USER_ID }}
      IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate copy
        run: node automation/instagram-template/scripts/publish-carousel.mjs --account "$ACCOUNT" --validate-copy

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Select manual content slot
        shell: bash
        run: echo "INSTAGRAM_TEMPLATE_SLOT_INDEX=${{ github.event.inputs.slot_index || '0' }}" >> "$GITHUB_ENV"

      - name: Publish feed and story
        shell: bash
        run: |
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node automation/instagram-template/scripts/publish-carousel.mjs --account "$ACCOUNT" $ARGS

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-template-runs
          path: automation/instagram-template/runs/
          if-no-files-found: ignore
